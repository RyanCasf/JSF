<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">
	
	<ui:composition template="/template/padrao.xhtml">
		<ui:define name="titulo">Início</ui:define>
		
		<ui:define name="conteudo">
			<style>
				.welcome-banner {
					padding: 30px;
					border-radius: 12px;
					border: 1px solid var(--border);
					background: linear-gradient(135deg, #2a2a35 0%, #1a1a22 100%);
				}
			</style>
			<h:form id="formularioInicio">
				<div class="welcome-banner">
					<h2>Bem-vindo!</h2>
					<p>Explore os componentes de UI disponíveis no painel.</p>
				</div>
				
				<p:separator/>
				
				<h:panelGroup>
					<h:outputText value="Tema:"/>
					<p:selectOneMenu
						style="width:100%"
						value="#{inicioBean.tema}">
						
						<f:selectItems value="#{inicioBean.temas}"/>
						
						<p:ajax
							update="@all"
							event="change"
							process="@this"
							onstart="dlg.show()"
							oncomplete="dlg.hide()"
							listener="#{inicioBean.selecionarTema}"/>
					</p:selectOneMenu>
				</h:panelGroup>
			</h:form>
		</ui:define>
	</ui:composition>
</html>

<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">
	
	<ui:composition template="/template/padrao.xhtml">
		<ui:define name="titulo">Chat</ui:define>
		
		<ui:define name="conteudo">
			<style>
				:root {
					--primary: #3b82f6;
					--bubble-sent: #3b82f6;
					--bubble-recv: #f1f5f9;
					--bubble-sent-text: #ffffff;
					--bubble-recv-text: #1e293b;
				}
				
				.sidebar-interacoes {
					width: 300px;
					width: clamp(220px, 20%, 300px);
					
					display: flex;
					flex-direction: column;
					border-right: 1px solid var(--border);
				}
				
				.sidebar-header {
					display: flex;
					margin-left: 10px;
					align-items: center;
					border-bottom: 1px solid var(--border);
				}
				
				.contacts {
					flex: 1;
					overflow-y: auto;
				}
				
				.contact-item {
					gap: 12px;
					display: flex;
					padding: 0px 10px;
					align-items: center;
					border-bottom: 1px solid var(--border);
				}
				
				.contact-item.selecionado, .contact-item:hover {
					background: var(--border);
				}
				
				.contact-info h4 {
					color: black;
					margin-bottom: 6px;
				}
				
				.contact-info p {
					margin-top: 0;
					font-size: 0.75rem;
				}
				
				.main-content {
					flex: 1;
					display: flex;
					flex-direction: column;
				}
				
				.messages {
					flex: 1;
					gap: 12px;
					padding: 25px;
					display: flex;
					overflow-y: auto;
					flex-direction: column;
				}
				
				.msg {
					max-width: 70%;
					line-height: 1.4;
					font-size: 0.9rem;
					padding: 12px 16px;
					border-radius: 15px;
					word-wrap: break-word;
				}
				
				.msg.sent {
					align-self: flex-end;
					background: var(--bubble-sent);
					color: var(--bubble-sent-text);
					border-bottom-right-radius: 2px;
				}
				
				.msg.received {
					align-self: flex-start;
					background: var(--bubble-recv);
					color: var(--bubble-recv-text);
					border-bottom-left-radius: 2px;
				}
				
				.footer {
					gap: 10px;
					padding: 10px;
					display: flex;
					border-top: 1px solid var(--border);
				}
				
				.footer input {
					flex: 1;
					color: black;
					outline: none;
					padding: 12px 15px;
					border-radius: 10px;
					border: 1px solid var(--border);
				}
				
				.enviar {
					display: flex;
					padding: 0 25px;
					align-items: center;
					border-radius: 10px;
					color: white !important;
					transition: opacity 0.2s;
					background: var(--primary);
					text-decoration: none !important;
				}
				
				.enviar:hover {
					opacity: 0.9;
				}
				
				.avatar {
					color: white;
					width: 40px;
					height: 40px;
					display: flex;
					min-width: 40px;
					font-weight: bold;
					align-items: center;
					border-radius: 50%;
					background: #0071BC;
					justify-content: center;
				}
			</style>
			
			<h:form id="formGemini">
				<div class="ui-fluid" style="display:flex;overflow:hidden;height: calc(100vh - 150px)">
					<aside class="sidebar-interacoes">
						<div class="sidebar-header">
							<p:commandLink
								update="@form"
								process="@this"
								styleClass="botao"
								onclick="dlg.show()"
								oncomplete="dlg.hide()"
								style="margin-right:10px"
								title="Adicionar nova interação"
								actionListener="#{chatBean.adicionarInteracao}">
								+
							</p:commandLink>
							
							<h4>Interações</h4>
						</div>
						
						<div class="contacts">
							<ui:repeat var="i" value="#{chatBean.negocio.interacoes}" varStatus="status">
								<p:commandLink
									update="@form"
									process="@this"
									onclick="dlg.show()"
									oncomplete="dlg.hide()"
									actionListener="#{chatBean.selecionarInteracao(status.index)}">
									
									<div class="contact-item #{chatBean.contatoSelecionado(status.index)}">
										<div class="avatar">IA</div>
										<div class="contact-info">
											<h4>Interação #{status.index + 1}</h4>
											<p>Perguntas: #{i.chat.size()}</p>
										</div>
									</div>
								</p:commandLink>
							</ui:repeat>
						</div>
					</aside>
					
					<h:panelGroup styleClass="main-content" id="painelMensagem">
						<div class="messages">
							<ui:repeat var="m" value="#{chatBean.negocio.interacoes[chatBean.negocio.indexInteracao].chat}" varStatus="statusMensagem">
								<div class="msg #{m.tipo eq 'SISTEMA' ? 'received' : 'sent'}">
									<h:outputText value="#{m.mensagem}" escape="false"/>
									
									<h:panelGroup layout="block" style="text-align:right;padding-top:5px" rendered="#{m.disponivel}">
										<p:commandLink
	          								ajax="false"
											process="@this"
											immediate="true"
											styleClass="botao"
											target="downloadFrame"
											actionListener="#{chatBean.prepararCsv(statusMensagem.index)}">
											
											Obter Dados em Planilha
										</p:commandLink>
										
										<p:commandLink
											process="@this"
											styleClass="botao"
											onclick="dlg.show()"
											update=":formGeminiDados"
											oncomplete="dlgGeminiDados.show()"
											actionListener="#{chatBean.prepararDadosApresentacao(statusMensagem.index)}">
											
											Visualizar Dados
										</p:commandLink>
									</h:panelGroup>
								</div>
							</ui:repeat>
						</div>
						
						<footer class="footer">
							<p:remoteCommand name="atualizarInputHiddenPergunta" process="@this,inputHiddenPergunta"/>
							<h:inputHidden id="inputHiddenPergunta" value="#{chatBean.negocio.chat.mensagem}"/>
							<input type="text" id="inputPergunta" placeholder="Digite sua mensagem..." autocomplete="off"></input>
							
							<p:defaultCommand target="kronosys-ia-chat-botao-enviar"/>
							<p:commandLink
								process="@this"
								styleClass="enviar"
								onclick="dlg.show()"
								oncomplete="dlg.hide()"
								id="kronosys-ia-chat-botao-enviar"
								actionListener="#{chatBean.negocio.chat.mensagem}">
								Enviar
							</p:commandLink>
						</footer>
						
						<script type="text/javascript">
							try {
								const painelMensagens = document.getElementsByClassName('messages')[0];
								if (painelMensagens) {
									painelMensagens.scrollTop = painelMensagens.scrollHeight;
								}
							}
							catch (error) {}
						</script>
					</h:panelGroup>
				</div>
			</h:form>
			
			<script type="text/javascript">
			// <![CDATA[
				function preencherInputHiddenPergunta() {
					let inputHiddenPergunta = document.getElementById('formGemini:inputHiddenPergunta');
					let inputPergunta = document.getElementById('inputPergunta');
					
					if (inputHiddenPergunta && inputPergunta) {
						inputHiddenPergunta.value = inputPergunta.value;
						atualizarInputHiddenPergunta();
					}
				}
			// ]]>
			</script>
			
			<p:dialog
				width="80%"
				modal="true"
				dynamic="true"
				position="top"
				widgetVar="dlgGeminiDados"
				onShow="dlg.hide();retornarBarraAoTopo(0,0)"
				header="KronoSys IA - Apresentação dos Dados">
				
			</p:dialog>
			
		</ui:define>
	</ui:composition>
</html>

<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">
	
	<ui:composition template="/template/padrao.xhtml">
		<ui:define name="titulo">InputNumber</ui:define>
		
		<ui:define name="conteudo">
			<h:form id="formInputNumber">
				<p:growl severity="info" showDetail="true"/>
				
				<h:outputText value="Inteiro:" style="display:block"/>
				<p:inputNumber
					decimalPlaces="0"
					decimalSeparator=","
					thousandSeparator="."
					value="#{inputNumberBean.inteiro}"
				/>
				
				<p:separator/>
				
				<p:commandButton
					value="Enviar"
					update="@form"
					process="@form"
					actionListener="#{inputNumberBean.enviar}"
				/>
			</h:form>
		</ui:define>
	</ui:composition>
</html>
